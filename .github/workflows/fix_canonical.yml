name: Rebuild Remixes Canonicals

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Rebuild canonical tags from file paths
        run: |
          python3 - <<'PY'
          import os
          import re

          BASE_DIR = "remixes"
          DOMAIN = "https://remixes.vincentbastille.online"

          canonical_re = re.compile(
              r'<link\s+rel=["\']canonical["\']\s+href=["\'][^"\']*["\']\s*/?>',
              re.IGNORECASE
          )

          changed = 0

          for root, _, files in os.walk(BASE_DIR):
              for filename in files:
                  if not filename.endswith(".html"):
                      continue

                  path = os.path.join(root, filename)
                  url_path = "/" + path.replace(os.sep, "/")
                  canonical = f'<link rel="canonical" href="{DOMAIN}{url_path}">'

                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()

                  if canonical_re.search(content):
                      new_content = canonical_re.sub(canonical, content, count=1)
                  else:
                      new_content = content.replace("</head>", f"  {canonical}\n</head>", 1)

                  if new_content != content:
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(new_content)

                      print(f"✔ Fixed canonical: {path} -> {DOMAIN}{url_path}")
                      changed += 1

          print(f"Total canonical fixed: {changed}")
          PY

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add remixes
          git diff --cached --quiet || git commit -m "Rebuild canonical tags from remix paths"
          git push
