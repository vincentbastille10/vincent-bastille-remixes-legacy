name: SEO Page Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate 70+ SEO pages and sitemap
        run: python generate.py
      - name: Add daily trending page
        run: python daily.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh seo remix pages"
            git push
          fi
