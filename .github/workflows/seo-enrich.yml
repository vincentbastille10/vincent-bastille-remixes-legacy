name: SEO Enrichment (MAX)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "bandcamp_full.json"
      - "scripts/enrich_seo_max.py"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (optional)
        run: |
          pip install rapidfuzz || true

      - name: Run SEO enrichment
        run: |
          python scripts/enrich_seo_max.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          git add .
          git commit -m "auto: SEO enrichment"
          git push
