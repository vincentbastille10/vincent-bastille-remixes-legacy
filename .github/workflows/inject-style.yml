name: Inject Global CSS

on:
  push:
    branches:
      - main

jobs:
  inject-css:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Inject CSS into all HTML files
        run: |
          python3 <<EOF
          import os

          HEAD_INJECTION = '''
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
'''

          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".html"):
                      path = os.path.join(root, file)

                      with open(path, "r", encoding="utf-8") as f:
                          content = f.read()

                      if HEAD_INJECTION.strip() in content:
                          continue

                      if "</head>" in content:
                          content = content.replace("</head>", HEAD_INJECTION + "\n</head>")

                          with open(path, "w", encoding="utf-8") as f:
                              f.write(content)

                          print(f"Updated {file}")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "bot-style"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🔥 Auto inject global style" || echo "No changes"
          git push
