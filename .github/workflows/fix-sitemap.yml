name: Fix sitemap static files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy sitemap and robots to root
        run: |
          cp public/sitemap.xml sitemap.xml
          cp public/robots.txt robots.txt || echo "User-agent: *\nAllow: /\nSitemap: https://remixes.vincentbastille.online/sitemap.xml" > robots.txt

      - name: Fix vercel.json
        run: |
          cat > vercel.json <<'EOF'
          {
            "version": 2,
            "routes": [
              {
                "src": "/sitemap.xml",
                "dest": "/sitemap.xml",
                "headers": {
                  "Content-Type": "application/xml; charset=utf-8"
                }
              },
              {
                "src": "/robots.txt",
                "dest": "/robots.txt",
                "headers": {
                  "Content-Type": "text/plain; charset=utf-8"
                }
              },
              {
                "handle": "filesystem"
              },
              {
                "src": "/(.*)",
                "dest": "/$1"
              }
            ]
          }
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sitemap.xml robots.txt vercel.json
          git commit -m "Fix sitemap and robots static serving" || echo "No changes to commit"
          git push
