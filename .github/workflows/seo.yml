name: SEO Auto Enrichment

on:
  push:
    branches: [main]

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run SEO script
        run: python seo_max.py

      - name: Commit changes
        run: |
          git config user.name "seo-bot"
          git config user.email "seo@bot.com"
          git add .
          git commit -m "SEO auto update" || echo "No changes"
          git push
