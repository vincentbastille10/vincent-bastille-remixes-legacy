name: SEO Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run SEO script
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: |
          python seo_page.py

      - name: Commit & push generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seo-pages sitemap.xml .seo_state.json || true
          git commit -m "auto: SEO pages generated" || echo "no changes"
          git push
