name: Generate exact sitemap

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate sitemap
        run: python scripts/generate_sitemap.py

      - name: Commit sitemap
        run: |
          git config user.name "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "No sitemap changes" || git commit -m "auto: update sitemap exact"
          git push
