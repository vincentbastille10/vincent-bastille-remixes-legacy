name: Force Root URLs for All Remixes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Force root canonical and OG URLs
        run: |
          python3 - <<'PY'
          import os
          import re

          BASE_DIR = "remixes"
          DOMAIN = "https://remixes.vincentbastille.online"

          canonical_re = re.compile(
              r'<link\b[^>]*rel=["\']canonical["\'][^>]*>',
              re.IGNORECASE
          )

          og_url_re = re.compile(
              r'<meta\b[^>]*property=["\']og:url["\'][^>]*>',
              re.IGNORECASE
          )

          twitter_url_re = re.compile(
              r'<meta\b[^>]*name=["\']twitter:url["\'][^>]*>',
              re.IGNORECASE
          )

          changed = 0

          for root, _, files in os.walk(BASE_DIR):
              for filename in files:
                  if not filename.endswith(".html"):
                      continue

                  path = os.path.join(root, filename)
                  public_url = f"{DOMAIN}/{filename}"

                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()

                  new_content = content

                  canonical_tag = f'<link rel="canonical" href="{public_url}">'
                  og_url_tag = f'<meta property="og:url" content="{public_url}">'
                  twitter_url_tag = f'<meta name="twitter:url" content="{public_url}">'

                  if canonical_re.search(new_content):
                      new_content = canonical_re.sub(canonical_tag, new_content, count=1)
                  else:
                      new_content = new_content.replace("</head>", f"  {canonical_tag}\n</head>", 1)

                  if og_url_re.search(new_content):
                      new_content = og_url_re.sub(og_url_tag, new_content, count=1)
                  else:
                      new_content = new_content.replace("</head>", f"  {og_url_tag}\n</head>", 1)

                  if twitter_url_re.search(new_content):
                      new_content = twitter_url_re.sub(twitter_url_tag, new_content, count=1)

                  if new_content != content:
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(new_content)

                      print(f"✔ Forced: {path} -> {public_url}")
                      changed += 1

          print(f"Total files changed: {changed}")
          PY

      - name: Force sitemap root URLs
        run: |
          python3 - <<'PY'
          import os
          import re

          DOMAIN = "https://remixes.vincentbastille.online"

          for path in ["sitemap.xml", "public/sitemap.xml", "remixes/sitemap.xml"]:
              if not os.path.exists(path):
                  continue

              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()

              new_content = content
              new_content = new_content.replace(f"{DOMAIN}/remixes/", f"{DOMAIN}/")
              new_content = new_content.replace(f"{DOMAIN}/seo-pages/", f"{DOMAIN}/")
              new_content = new_content.replace(f"{DOMAIN}{DOMAIN}/", f"{DOMAIN}/")

              if new_content != content:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  print(f"✔ Fixed sitemap: {path}")
          PY

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add remixes sitemap.xml public/sitemap.xml remixes/sitemap.xml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Force root canonical URLs for remix pages"
          git push
